name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Typecheck, build, lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      # Harte Gates: TypeScript-Typecheck + Production-Build (tsc -b && vite build)
      - run: npm run build
      # Lint vorerst informativ (3 vorbestehende Fehler) -> blockt CI nicht
      - run: npm run lint
        continue-on-error: true
